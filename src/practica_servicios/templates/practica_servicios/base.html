<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serivicios</title>
</head>

    <body>
        <nav style="text-align: center;">
            <h1>Servicios</h1>
            <a href="{% url 'practica_servicios:index' %}">🏠 Home</a>
            <a href="{% url 'practica_servicios:cliente_list' %}">👥 Clientes</a>
            <a href="{% url 'practica_servicios:servicios' %}">🛠️ Servicios</a>  
            <a href="{% url 'practica_servicios:pedidos' %}">📦 Pedidos</a>
        </nav>

        <hr>

    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li style="padding: 10px; margin-bottom: 10px; list-style: none; 
                           background-color: {% if message.tags == 'error' %}#f8d7da{% else %}#d4edda{% endif %};
                           color: {% if message.tags == 'error' %}#721c24{% else %}#155724{% endif %};
                           border: 1px solid {% if message.tags == 'error' %}#f5c6cb{% else %}#c3e6cb{% endif %};">
                    {{ message }}
                </li>
            {% endfor %}
        </ul>
    {% endif %}

        <main>
            {% block contenido %}
            {% endblock contenido %} 
        </main>
    </body>

</html>
